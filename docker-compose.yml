services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - rabbitmq-logs:/var/log/rabbitmq
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.1
        aliases:
          - rabbitmq

  syslogng:
    image: balabit/syslog-ng:latest
    container_name: syslogng
    restart: unless-stopped
    ports:
      - 514:5514/udp
      - 601:6601/tcp
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.2
        aliases:
          - syslogng

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.3
        aliases:
          - zipkin

  redisdb:
    image: redis
    container_name: redisdb
    restart: unless-stopped
    ports:
      - 6379
    volumes:
      - redis-data:/data
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.4
        aliases:
          - redisdb

  postgres:
    image: postgis/postgis:latest
    container_name: postgres
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: postgres
    volumes:
      - .:/var/lib/postgres
      - postgres-data:/var/lib/postgresql/data
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.5
        aliases:
          - postgres

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5000:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.6
        aliases:
          - pgadmin

  mariadb:
    image: "mariadb:10.3.35"
    container_name: mariadb
    restart: unless-stopped
    platform: linux/amd64
    command: '--sql_mode=""'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: database
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.7
        aliases:
          - mariadb

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    links:
      - mariadb
    ports:
      - 8089:8080
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.8
        aliases:
          - adminer

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    restart: unless-stopped
    ports:
      - 1025
      - 8025
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.9
        aliases:
          - mailhog

  heimdall:
    image: linuxserver/heimdall
    container_name: heimdall
    volumes:
      - ./appdata/heimdall:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    ports:
      - 83:80
      - 443:443
    restart: unless-stopped
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.10
        aliases:
          - heimdall

  nginx:
    image: linuxserver/nginx
    container_name: nginx
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - ./appdata/nginx:/config
    ports:
      - 81:80
      - 444:443
    restart: unless-stopped
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.11
        aliases:
          - nginx
  # jaeger:
  #   image: jaegertracing/all-in-one:latest
  #   container_name: jaeger
  #   environment:
  #     - COLLECTOR_ZIPKIN_HTTP_PORT=9412
  #   ports:
  #     - "5775:5775/udp"
  #     - "6831:6831/udp"
  #     - "6832:6832/udp"
  #     - "5778:5778"
  #     - "16686:16686"
  #     - "14268:14268"
  #     - "14250:14250"
  #     - "9412:9412"
  #   restart: unless-stopped
  #   networks:
  #     docker-apps-network:
  #       ipv4_address: 172.20.128.12
  #       aliases:
  #         - jaeger
  mongodb:
    image: mongo
    container_name: mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.13
        aliases:
          - mongodb
  consul:
    image: hashicorp/consul:latest
    container_name: consul
    restart: unless-stopped
    environment:
      - CONSUL_BIND_INTERFACE=eth0 # Interface used for Consul
      - CONSUL_LOCAL_CONFIG={"verify_incoming":false,"verify_outgoing":false,"verify_server_hostname":false}
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - consul-data:/consul/data
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.14
        aliases:
          - consul
    command: "agent -server -ui -bootstrap-expect=1 -client=0.0.0.0 -bind=0.0.0.0"
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.15
        aliases:
          - prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.16
        aliases:
          - grafana

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"

      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      CLUSTER_ID: "F4oWmn8cRQy6PE6i2w9X2w"

      KAFKA_NUM_PARTITIONS: 3

    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.17
        aliases:
          - kafka
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.18
        aliases:
          - kafka

  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.19
        aliases:
          - portainer

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      docker-apps-network:
        ipv4_address: 172.20.128.20
        aliases:
          - minio

volumes:
  rabbitmq-data:
    driver: local
  rabbitmq-logs:
    driver: local
  redis-data:
    driver: local
  pgadmin-data:
    driver: local
  postgres-data:
    driver: local
  mariadb-data:
    driver: local
  mongodb-data:
    driver: local
  consul-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  kafka_data:
    driver: local
  portainer-data:
    driver: local
  minio-data:
    driver: local

networks:
  docker-apps-network:
    name: docker-apps-network
    ipam:
      config:
        - subnet: 172.20.0.0/16
